services:
  bridge:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: bedrock-bridge-qq:local
    container_name: mcqq-bridge
    restart: unless-stopped
    user: "${BRIDGE_UID:-1000}:${BRIDGE_GID:-1000}"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./packs:/app/packs
      - ./napcat/config:/app/napcat/config
    depends_on:
      - napcat

  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: mcqq-napcat
    restart: unless-stopped
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
    ports:
      - "3000:3000"
      - "3001:3001"
      - "6099:6099"
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./napcat/qq:/app/.config/QQ
      - ./napcat/plugins:/app/napcat/plugins
